<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול שיבוץ מורים — יוגה אפריל 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e5e2da;
    --text: #1a1a18;
    --muted: #6b6860;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --amber: #92400e;
    --amber-light: #fef3c7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .page { max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;
  }
  .header-title { font-size: 28px; font-weight: 700; }
  .header-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.green { color: var(--accent); }
  .stat-value.amber { color: var(--amber); }

  /* Teacher chips */
  .teachers-bar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 1.25rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s;
  }
  .chip.active { border-color: currentColor; background: #eee; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: var(--muted); padding: 12px; text-align: right; border-bottom: 1px solid var(--border); background: #f0ede6; white-space: nowrap; }
  td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid #f0ede6; }

  /* New Buttons */
  .btn {
    font-family: 'Heebo', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; transition: 0.2s;
  }
  .btn:hover { background: #f0ede6; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  .sync { font-size: 12px; padding: 6px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
  .sync.loading { background: #dbeafe; color: #1e3a5f; }
  .sync.idle { background: var(--accent-light); color: var(--accent); }
  
  select.assign { width: 100%; padding: 5px; border-radius: 6px; border: 1px solid var(--border); font-family: 'Heebo'; }
  select.assign.filled { background: var(--accent-light); border-color: var(--accent); font-weight: bold; }
  
  /* עמודות מיושרות */
  .date-col { width: 10%; text-align: center; }
  .day-col { width: 8%; text-align: center; font-weight: bold; }
  .time-col { width: 12%; text-align: center; }
  .type-col { width: 25%; }
  .loc-col { width: 10%; }
  .teacher-col { width: 35%; }

</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <div class="header-title">ניהול שיבוץ מורים — יוגה</div>
      <div class="header-sub" id="subtitle">אפריל 2026</div>
    </div>
    <div class="header-actions">
      <div class="sync loading" id="sync"><span id="sync-text">מתחבר לגיליון...</span></div>
      <button class="btn" onclick="window.open('https://zoharrb-ci.github.io/studio-april/', '_blank')">👁️ תצוגת שיעורים</button>
      <button class="btn" onclick="shareLink()">🔗 שיתוף קישור</button>
      <button class="btn" onclick="loadData()">↻ רענן</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">סה״כ שיעורים</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">משובצים</div><div class="stat-value green" id="s-assigned">—</div></div>
    <div class="stat"><div class="stat-label">ממתינים</div><div class="stat-value amber" id="s-pending">—</div></div>
  </div>

  <div class="teachers-bar">
    <span style="font-size:13px; color:var(--muted)">מורים פעילים:</span>
    <div id="chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    <button class="btn" style="padding:4px 10px; font-size:12px;" onclick="addTeacher()">+ הוסף מורה לרשימה</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="date-col">תאריך</th>
          <th class="day-col">יום</th>
          <th class="time-col">שעה</th>
          <th class="type-col">סוג שיעור</th>
          <th class="loc-col">מיקום</th>
          <th class="teacher-col">מורה משובץ/ת</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbzNS2b2YtYUYed_-3G6QhQudUAjkfle7FecV04vEMQ-p9o7LEEs-Z0qz8_sTJZ1ofL5-g/exec';
let lessons = [], teachers = [], selectedT = null;

const DAYS_HEBREW = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];

function sync(state, text) {
  const s = document.getElementById('sync');
  s.className = 'sync ' + state;
  document.getElementById('sync-text').textContent = text;
}

// --- פונקציות פירמוט תאריכים חדשות ---

// הופך אובייקט תאריך לתצוגת DD/MM
function formatDate(dateString) {
  if (!dateString) return '';
  try {
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString; // אם זה לא תאריך תקין, החזר את המקור
    
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    return `${day}/${month}`;
  } catch (e) {
    return dateString;
  }
}

// מחלץ את שם היום בעברית
function formatDay(dateString) {
  if (!dateString) return '';
  try {
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString;
    return DAYS_HEBREW[date.getDay()];
  } catch (e) {
    return dateString;
  }
}

// ---------------------------------------

// טעינת נתונים
function loadData() {
  sync('loading', 'מעדכן נתונים...');
  const cb = 'cb_' + Date.now();
  window[cb] = function(data) {
    delete window[cb];
    // כאן אנחנו משתמשים בפונקציות הפירמוט החדשות בעת הטעינה
    lessons = data.map(r => ({ 
      ...r, 
      date: formatDate(r.date), // מפרמט תאריך
      day: formatDay(r.day),   // מחלץ יום
      teacher: String(r.teacher || '').trim() 
    }));
    
    // חילוץ מורים קיימים מהגיליון
    teachers = [...new Set(lessons.map(l => l.teacher).filter(Boolean))];
    
    renderChips();
    render();
    sync('idle', 'מחובר לגיליון ✓');
  };
  const s = document.createElement('script');
  s.src = `${URL}?callback=${cb}&t=${Date.now()}`;
  document.head.appendChild(s);
}

// שמירה לגיליון
async function save(idx, teacher) {
  sync('loading', 'שומר בגיליון...');
  try {
    await fetch(URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ rowIndex: idx, teacher: teacher })
    });
    sync('idle', 'השינוי נשמר ✓');
  } catch (e) {
    sync('error', 'שגיאת תקשורת');
  }
}

function renderChips() {
  const container = document.getElementById('chips');
  container.innerHTML = '';
  teachers.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (selectedT === t ? ' active' : '');
    chip.textContent = t;
    chip.onclick = () => {
      selectedT = (selectedT === t) ? null : t;
      renderChips(); render();
    };
    container.appendChild(chip);
  });
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  
  const filtered = lessons.filter(l => !selectedT || l.teacher === selectedT);
  
  filtered.forEach(l => {
    const tr = document.createElement('tr');
    let opts = '<option value="">בחר מורה...</option>';
    teachers.forEach(t => {
      opts += `<option value="${t}" ${l.teacher === t ? 'selected' : ''}>${t}</option>`;
    });

    tr.innerHTML = `
      <td class="date-col">${l.date}</td>
      <td class="day-col">${l.day}</td>
      <td class="time-col">${l.time || ''}</td>
      <td class="type-col">${l.type || ''}</td>
      <td class="loc-col">${l.loc || ''}</td>
      <td class="teacher-col">
        <select class="assign ${l.teacher ? 'filled' : ''}" onchange="updateAssignment(${l.rowIndex}, this.value)">
          ${opts}
        </select>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('s-total').textContent = lessons.length;
  document.getElementById('s-assigned').textContent = lessons.filter(l => l.teacher).length;
  document.getElementById('s-pending').textContent = lessons.length - lessons.filter(l => l.teacher).length;
}

function updateAssignment(rowIndex, val) {
  const lesson = lessons.find(l => l.rowIndex === rowIndex);
  if (lesson) lesson.teacher = val;
  save(rowIndex, val);
  render();
}

function addTeacher() {
  const name = prompt('הכנס שם מורה חדשה:');
  if (name && name.trim()) {
    if (!teachers.includes(name.trim())) {
      teachers.push(name.trim());
      renderChips();
      render();
    }
  }
}

function shareLink() {
  const url = 'https://zoharrb-ci.github.io/studio-april/';
  navigator.clipboard.writeText(url).then(() => {
    alert('הקישור הועתק ללוח!');
  });
}

loadData();
</script>
</body>
</html>
