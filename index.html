<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול שיבוץ מורים — יוגה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f7f5f0; --surface: #ffffff; --border: #e5e2da; --accent: #2d6a4f; --accent-light: #e8f5ee; --danger: #ae2012; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); padding: 1.5rem; }
  .page { max-width: 1200px; margin: 0 auto; }
  
  /* Top Bar */
  .top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .status-indicator { font-size: 13px; padding: 4px 12px; border-radius: 20px; background: #fff; border: 1px solid var(--border); }
  .status-indicator.syncing { color: #92400e; background: #fef3c7; }
  .status-indicator.ready { color: var(--accent); background: var(--accent-light); }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 1rem 0; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f0ede6; padding: 12px; font-size: 12px; text-align: right; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 1px solid #f0ede6; }

  .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); font-family: 'Heebo'; font-size: 13px; }
  .btn-add { background: var(--accent); color: white; border: none; font-weight: bold; }
  .btn-help { background: #1a1a18; color: white; border: none; }
  .btn-danger { color: var(--danger); background: #fff5f5; border: 1px solid #f8d7da; padding: 4px 8px; }
  
  input, select { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Heebo'; font-size: 13px; }
  .day-label { font-weight: bold; color: var(--accent); }
</style>
</head>
<body>

<div class="page">
  <div class="top-info">
    <div id="status" class="status-indicator ready">מחובר לגיליון ✓</div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-help" onclick="alert('עזרה טכנית (זוהר):\n052-26567815')">❓ עזרה</button>
      <button class="btn" onclick="loadData()">↻ רענן</button>
    </div>
  </div>

  <div class="header">
    <h1>ניהול מערכת שעות</h1>
    <button class="btn btn-add" onclick="addRow()">+ הוסף שיעור חדש</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:12%">תאריך (DD/MM)</th>
          <th style="width:12%">יום בשבוע</th>
          <th style="width:12%">שעה</th>
          <th style="width:20%">סוג שיעור</th>
          <th style="width:10%">מיקום</th>
          <th style="width:20%">מורה</th>
          <th style="width:10%">פעולות</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div style="display: flex; justify-content: center; padding: 1rem;">
    <button class="btn btn-add" onclick="addRow()">+ הוסף שיעור נוסף בתחתית</button>
  </div>
</div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbzNS2b2YtYUYed_-3G6QhQudUAjkfle7FecV04vEMQ-p9o7LEEs-Z0qz8_sTJZ1ofL5-g/exec';
let lessons = [], teachers = [];
const DAYS = ['יום ראשון', 'יום שני', 'יום שלישי', 'יום רביעי', 'יום חמישי', 'יום שישי', 'יום שבת'];

function setStatus(text, type) {
  const s = document.getElementById('status');
  s.textContent = text;
  s.className = 'status-indicator ' + (type || 'ready');
}

function loadData() {
  setStatus('מעדכן נתונים...', 'syncing');
  const cb = 'cb_' + Date.now();
  window[cb] = (data) => {
    delete window[cb];
    lessons = data;
    teachers = [...new Set(lessons.map(l => l.teacher).filter(Boolean))];
    render();
    setStatus('מעודכן ✓', 'ready');
  };
  const s = document.createElement('script');
  s.src = `${URL}?callback=${cb}&t=${Date.now()}`;
  document.head.appendChild(s);
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  lessons.forEach(l => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${l.date || ''}" placeholder="DD/MM" onchange="autoFillDay(${l.rowIndex}, this.value)"></td>
      <td class="day-label">${l.day || ''}</td>
      <td><input type="text" value="${l.time || ''}" onchange="updateCell(${l.rowIndex}, 'time', this.value)"></td>
      <td><input type="text" value="${l.type || ''}" onchange="updateCell(${l.rowIndex}, 'type', this.value)"></td>
      <td><input type="text" value="${l.loc || ''}" onchange="updateCell(${l.rowIndex}, 'loc', this.value)"></td>
      <td>
        <select onchange="updateCell(${l.rowIndex}, 'teacher', this.value)">
          <option value="">בחר...</option>
          ${teachers.map(t => `<option value="${t}" ${l.teacher === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn-danger" onclick="deleteRow(${l.rowIndex})">מחק</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function autoFillDay(rowIndex, dateVal) {
  if (!dateVal.includes('/')) return;
  const [d, m] = dateVal.split('/');
  const dateObj = new Date(new Date().getFullYear(), m - 1, d);
  const dayName = DAYS[dateObj.getDay()];
  
  updateCell(rowIndex, 'date', dateVal);
  if (dayName) updateCell(rowIndex, 'day', dayName);
  setTimeout(loadData, 1000); 
}

async function updateCell(rowIndex, field, value) {
  setStatus('שומר שינויים...', 'syncing');
  await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'update', rowIndex, field, value }) });
  setStatus('כל השינויים נשמרו', 'ready');
}

async function addRow() {
  setStatus('מוסיף שורה לגיליון...', 'syncing');
  await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addRow' }) });
  setTimeout(loadData, 1500); 
}

async function deleteRow(rowIndex) {
  if (!confirm('למחוק שיעור זה?')) return;
  setStatus('מוחק...', 'syncing');
  await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteRow', rowIndex }) });
  loadData();
}

loadData();
</script>
</body>
</html>
