<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול מערכת שעות - יוגה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --border: #e5e2da; --text: #1a1a18;
    --muted: #6b6860; --accent: #2d6a4f; --accent-light: #e8f5ee;
    --danger: #ae2012; --danger-light: #fdf0ef;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
  .page { max-width: 1200px; margin: 0 auto; }
  
  .header { display: flex; justify-content: space-between; margin-bottom: 2rem; align-items: center; }
  .header-actions { display: flex; gap: 8px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  
  .teachers-bar { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
    padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  
  .chip { 
    display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; 
    border-radius: 20px; font-size: 13px; background: #eee; cursor: pointer; border: 1.5px solid transparent;
  }
  .chip.active { border-color: var(--accent); background: var(--accent-light); }
  .delete-chip { color: var(--danger); font-weight: bold; margin-right: 4px; padding: 0 4px; border-radius: 50%; }
  .delete-chip:hover { background: var(--danger-light); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f0ede6; padding: 12px; font-size: 12px; text-align: right; color: var(--muted); }
  td { padding: 10px; border-bottom: 1px solid #f0ede6; font-size: 13px; }

  .btn { 
    font-family: 'Heebo'; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); 
    cursor: pointer; background: white; transition: 0.2s; font-size: 13px;
  }
  .btn:hover { background: #f0ede6; }
  .btn-add { background: var(--accent); color: white; border: none; }
  .btn-delete { color: var(--danger); border: 1px solid #f8d7da; background: #fff5f5; padding: 4px 8px; }
  .btn-delete:hover { background: var(--danger); color: white; }

  select, input { 
    width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--border); font-family: 'Heebo'; font-size: 13px;
  }
  .sync { font-size: 12px; padding: 6px 12px; border-radius: 20px; background: #eee; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div>
      <h1 style="font-size: 24px;">ניהול מערכת שעות</h1>
      <div id="sync" class="sync">מתחבר לגיליון...</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-add" onclick="addRow()">+ הוסף שיעור חדש</button>
      <button class="btn" onclick="loadData()">↻ רענן</button>
    </div>
  </div>

  <div class="teachers-bar">
    <span style="font-size:13px; color:var(--muted)">מורים:</span>
    <div id="chips" style="display:flex; gap:6px;"></div>
    <button class="btn" style="padding:4px 8px; font-size:12px;" onclick="addTeacher()">+ הוסף מורה</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:10%">תאריך</th>
          <th style="width:8%">יום</th>
          <th style="width:10%">שעה</th>
          <th style="width:20%">סוג שיעור</th>
          <th style="width:10%">מיקום</th>
          <th style="width:25%">מורה</th>
          <th style="width:7%">פעולות</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbzNS2b2YtYUYed_-3G6QhQudUAjkfle7FecV04vEMQ-p9o7LEEs-Z0qz8_sTJZ1ofL5-g/exec';
let lessons = [], teachers = [], selectedT = null;

async function apiCall(action, data) {
  document.getElementById('sync').textContent = 'מעדכן גיליון...';
  try {
    await fetch(URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action, ...data })
    });
    document.getElementById('sync').textContent = 'נשמר בהצלחה ✓';
  } catch (e) {
    document.getElementById('sync').textContent = 'שגיאת שמירה';
  }
}

function loadData() {
  const cb = 'cb_' + Date.now();
  window[cb] = (data) => {
    delete window[cb];
    lessons = data;
    teachers = [...new Set(lessons.map(l => l.teacher).filter(Boolean))];
    render();
    renderChips();
    document.getElementById('sync').textContent = 'מחובר לגיליון ✓';
  };
  const s = document.createElement('script');
  s.src = `${URL}?callback=${cb}&t=${Date.now()}`;
  document.head.appendChild(s);
}

function renderChips() {
  const container = document.getElementById('chips');
  container.innerHTML = '';
  teachers.forEach(t => {
    const chip = document.createElement('span');
    chip.className = `chip ${selectedT === t ? 'active' : ''}`;
    chip.innerHTML = `${t} <span class="delete-chip" onclick="deleteTeacher('${t}', event)">×</span>`;
    chip.onclick = () => { selectedT = (selectedT === t) ? null : t; render(); renderChips(); };
    container.appendChild(chip);
  });
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const filtered = lessons.filter(l => !selectedT || l.teacher === selectedT);

  filtered.forEach((l, index) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${l.date || ''}" onchange="updateCell(${l.rowIndex}, 'date', this.value)"></td>
      <td>${l.day || ''}</td>
      <td><input type="text" value="${l.time || ''}" onchange="updateCell(${l.rowIndex}, 'time', this.value)"></td>
      <td><input type="text" value="${l.type || ''}" onchange="updateCell(${l.rowIndex}, 'type', this.value)"></td>
      <td><input type="text" value="${l.loc || ''}" onchange="updateCell(${l.rowIndex}, 'loc', this.value)"></td>
      <td>
        <select onchange="updateCell(${l.rowIndex}, 'teacher', this.value)">
          <option value="">בחר מורה...</option>
          ${teachers.map(t => `<option value="${t}" ${l.teacher === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn-delete" onclick="deleteRow(${l.rowIndex})">מחק</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function updateCell(rowIndex, field, value) {
  apiCall('update', { rowIndex, field, value });
}

function addRow() {
  const newRowIndex = lessons.length > 0 ? Math.max(...lessons.map(l => l.rowIndex)) + 1 : 2;
  lessons.push({ rowIndex: newRowIndex, date: '', day: '', time: '', type: '', loc: '', teacher: '' });
  render();
  apiCall('addRow', { rowIndex: newRowIndex });
}

function deleteRow(rowIndex) {
  if (confirm('למחוק את השיעור מהמערכת?')) {
    lessons = lessons.filter(l => l.rowIndex !== rowIndex);
    render();
    apiCall('deleteRow', { rowIndex });
  }
}

function addTeacher() {
  const name = prompt('שם מורה חדשה:');
  if (name && !teachers.includes(name)) {
    teachers.push(name);
    renderChips();
    render();
  }
}

function deleteTeacher(name, e) {
  e.stopPropagation();
  if (confirm(`להסיר את ${name} מרשימת המורים?`)) {
    teachers = teachers.filter(t => t !== name);
    renderChips();
    render();
  }
}

loadData();
</script>
</body>
</html>
