<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול מערכת שעות — יוגה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f7f5f0; --surface: #ffffff; --border: #e5e2da; --accent: #2d6a4f; --accent-light: #e8f5ee; --danger: #ae2012; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); padding: 1.5rem; margin: 0; }
  .page { max-width: 1200px; margin: 0 auto; }
  
  /* Stats Section */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--accent); }

  /* Header & Buttons */
  .top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .status-indicator { font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; }
  .btn { padding: 9px 18px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); font-family: 'Heebo'; font-size: 14px; font-weight: 500; }
  .btn-add { background: var(--accent); color: white; border: none; }
  
  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f0ede6; padding: 12px; font-size: 13px; text-align: right; }
  td { padding: 10px; border-bottom: 1px solid #f0ede6; }

  /* New Lesson Modal (החלונית החדשה) */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-content { background: white; padding: 25px; border-radius: 15px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .modal-content h3 { margin-top: 0; color: var(--accent); }
  .modal-content input { margin-bottom: 12px; width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }

  input, select { padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Heebo'; }
  .day-label { font-weight: bold; color: var(--accent); }
</style>
</head>
<body>

<div class="page">
  <div class="top-info">
    <div id="status" class="status-indicator">מתחבר לגיליון...</div>
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="alert('עזרה (זוהר): 052-26567815')">❓ עזרה</button>
      <button class="btn" onclick="loadData()">↻ רענן</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div>סה״כ שיעורים</div><div id="s-total" class="stat-val">0</div></div>
    <div class="stat"><div>משובצים</div><div id="s-done" class="stat-val">0</div></div>
    <div class="stat"><div>ממתינים</div><div id="s-wait" class="stat-val" style="color:#92400e">0</div></div>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <h2>מערכת שעות</h2>
    <button class="btn btn-add" onclick="openModal()">+ הוסף שיעור</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:15%">תאריך</th>
          <th style="width:15%">יום</th>
          <th style="width:12%">שעה</th>
          <th style="width:20%">סוג שיעור</th>
          <th style="width:13%">מיקום</th>
          <th style="width:15%">מורה</th>
          <th style="width:10%">פעולות</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div style="display:flex; justify-content:center;">
    <button class="btn btn-add" onclick="openModal()">+ הוסף שיעור</button>
  </div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>הוספת שיעור חדש</h3>
    <label>תאריך (DD/MM):</label>
    <input type="text" id="m-date" placeholder="למשל 05/04" onchange="updateModalDay(this.value)">
    <label>יום בשבוע:</label>
    <input type="text" id="m-day" readonly style="background:#f0f0f0">
    <label>שעה:</label>
    <input type="text" id="m-time" placeholder="08:15-09:30">
    <label>סוג שיעור:</label>
    <input type="text" id="m-type">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">ביטול</button>
      <button class="btn btn-add" onclick="saveNewLesson()">שמור שיעור</button>
    </div>
  </div>
</div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbzNS2b2YtYUYed_-3G6QhQudUAjkfle7FecV04vEMQ-p9o7LEEs-Z0qz8_sTJZ1ofL5-g/exec';
let lessons = [], teachers = [];
const DAYS = ['יום ראשון', 'יום שני', 'יום שלישי', 'יום רביעי', 'יום חמישי', 'יום שישי', 'יום שבת'];

function cleanDateDisplay(val) {
  if (!val || typeof val !== 'string') return val;
  if (val.includes('GMT')) return val.split(' ')[2] + '/' + (new Date(val).getMonth()+1);
  return val;
}

function updateModalDay(val) {
  if (!val.includes('/')) return;
  const [d, m] = val.split('/');
  const dateObj = new Date(2026, m - 1, d);
  document.getElementById('m-day').value = DAYS[dateObj.getDay()] || '';
}

function openModal() { document.getElementById('addModal').style.display = 'flex'; }
function closeModal() { document.getElementById('addModal').style.display = 'none'; }

function loadData() {
  const cb = 'cb_' + Date.now();
  window[cb] = (data) => {
    delete window[cb];
    lessons = data.sort((a,b) => a.date.localeCompare(b.date));
    teachers = [...new Set(lessons.map(l => l.teacher).filter(Boolean))];
    render();
    document.getElementById('status').textContent = 'מעודכן ✓';
  };
  const s = document.createElement('script');
  s.src = `${URL}?callback=${cb}&t=${Date.now()}`;
  document.head.appendChild(s);
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  lessons.forEach(l => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${cleanDateDisplay(l.date)}</td>
      <td class="day-label">${l.day}</td>
      <td><input type="text" value="${l.time}" onchange="updateCell(${l.rowIndex}, 'time', this.value)"></td>
      <td><input type="text" value="${l.type}" onchange="updateCell(${l.rowIndex}, 'type', this.value)"></td>
      <td><input type="text" value="${l.loc}" onchange="updateCell(${l.rowIndex}, 'loc', this.value)"></td>
      <td>
        <select onchange="updateCell(${l.rowIndex}, 'teacher', this.value)">
          <option value="">בחר...</option>
          ${teachers.map(t => `<option value="${t}" ${l.teacher === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </td>
      <td><button onclick="deleteRow(${l.rowIndex})" style="color:red; cursor:pointer; background:none; border:none;">מחק</button></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('s-total').textContent = lessons.length;
  document.getElementById('s-done').textContent = lessons.filter(l => l.teacher).length;
  document.getElementById('s-wait').textContent = lessons.length - lessons.filter(l => l.teacher).length;
}

async function saveNewLesson() {
  const data = {
    action: 'addRow',
    date: document.getElementById('m-date').value,
    day: document.getElementById('m-day').value,
    time: document.getElementById('m-time').value,
    type: document.getElementById('m-type').value,
    teacher: '', loc: 'סטודיו'
  };
  document.getElementById('status').textContent = 'שומר...';
  await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
  closeModal();
  setTimeout(loadData, 1000);
}

async function updateCell(rowIndex, field, value) {
  await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'update', rowIndex, field, value }) });
}

async function deleteRow(rowIndex) {
  if (confirm('למחוק?')) {
    await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteRow', rowIndex }) });
    loadData();
  }
}

loadData();
</script>
</body>
</html>
